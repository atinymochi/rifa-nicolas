
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mi Rifa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a; --text: #f0ede6;
    --muted: #666; --sold: #e8453c; --sold-hover: #c73830;
    --available: #1a1a1a; --available-hover: #242424; --accent: #f5e642; --success: #3ddc84;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding: 2rem 1.5rem 4rem; max-width: 860px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .brand h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 800; letter-spacing: -1px; line-height: 1; }
  .brand h1 span { color: var(--accent); }
  .brand p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }
  .live-dot { display: flex; align-items: center; gap: 7px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.5px; }
  .live-dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); padding: 1rem 1.25rem; }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
  #stat-sold { color: var(--sold); }
  #stat-avail { color: var(--success); }
  .login-section { margin-bottom: 1.5rem; }
  .login-row { display: flex; gap: 8px; align-items: center; max-width: 340px; }
  input[type="password"] { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color 0.15s; }
  input[type="password"]:focus { border-color: var(--accent); }
  input[type="password"]::placeholder { color: var(--muted); }
  .btn { background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 18px; cursor: pointer; transition: background 0.15s, border-color 0.15s; white-space: nowrap; letter-spacing: 0.3px; }
  .btn:hover { background: var(--surface); border-color: #444; }
  .btn.accent { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn.accent:hover { background: #e8d93a; }
  .admin-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(61,220,132,0.1); border: 1px solid rgba(61,220,132,0.3); border-radius: 8px; padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--success); margin-bottom: 1rem; }
  .admin-badge::before { content: '●'; font-size: 8px; }
  .hint { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 1.25rem; letter-spacing: 0.3px; }
  .legend { display: flex; gap: 20px; margin-bottom: 1.25rem; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 7px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(56px, 1fr)); gap: 5px; }
  .num { height: 46px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; border-radius: 7px; border: 1px solid var(--border); background: var(--available); color: #555; cursor: default; transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.1s; user-select: none; }
  .num.sold { background: var(--sold); border-color: var(--sold); color: #fff; }
  .num.admin-mode { cursor: pointer; }
  .num.admin-mode:not(.sold):hover { background: var(--available-hover); border-color: #3a3a3a; color: var(--text); }
  .num.admin-mode.sold:hover { background: var(--sold-hover); border-color: var(--sold-hover); }
  .num.admin-mode:active { transform: scale(0.92); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); gap: 4px; }
    .num { height: 40px; font-size: 12px; }
    header { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Mi <span>Rifa</span></h1>
    <p>TABLERO · 300 NÚMEROS</p>
  </div>
  <div class="live-dot">EN VIVO</div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">Total</div><div class="stat-value">300</div></div>
  <div class="stat"><div class="stat-label">Vendidos</div><div class="stat-value" id="stat-sold">0</div></div>
  <div class="stat"><div class="stat-label">Disponibles</div><div class="stat-value" id="stat-avail">300</div></div>
</div>

<div class="login-section" id="login-section">
  <div class="login-row">
    <input type="password" id="pwd" placeholder="Clave de administrador..." />
    <button class="btn accent" onclick="tryLogin()">Entrar</button>
  </div>
</div>

<div id="admin-section" style="display:none;">
  <div class="admin-badge">Modo administrador activo</div>
  <p class="hint">Haz clic en un número para marcarlo como vendido o liberarlo.</p>
</div>

<div class="legend">
  <span><span class="legend-box" style="background:#1a1a1a;border:1px solid #2a2a2a;"></span>Disponible</span>
  <span><span class="legend-box" style="background:#e8453c;"></span>Vendido</span>
</div>

<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBlS7m6Wqt1BHwcILHPyF7CvDos9fgHo5A",
    authDomain: "rifa-nicolas.firebaseapp.com",
    databaseURL: "https://rifa-nicolas-default-rtdb.firebaseio.com",
    projectId: "rifa-nicolas",
    storageBucket: "rifa-nicolas.firebasestorage.app",
    messagingSenderId: "1016349889714",
    appId: "1:1016349889714:web:015dc688aabf340c4f25ab"
  };

  const PASS = "2908";
  let isAdmin = false;
  let sold = new Set();

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const rifaRef = ref(db, "rifa/sold");

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1800);
  }

  function updateStats() {
    document.getElementById("stat-sold").textContent = sold.size;
    document.getElementById("stat-avail").textContent = 300 - sold.size;
  }

  function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let i = 1; i <= 300; i++) {
      const el = document.createElement("div");
      el.className = "num" + (sold.has(i) ? " sold" : "") + (isAdmin ? " admin-mode" : "");
      el.textContent = i;
      el.addEventListener("click", () => toggleNum(i, el));
      grid.appendChild(el);
    }
    updateStats();
  }

  async function toggleNum(n, el) {
    if (!isAdmin) return;
    if (sold.has(n)) { sold.delete(n); el.classList.remove("sold"); showToast(`Número ${n} → disponible`); }
    else { sold.add(n); el.classList.add("sold"); showToast(`Número ${n} → vendido`); }
    updateStats();
    await set(rifaRef, [...sold]);
  }

  function tryLogin() {
    const val = document.getElementById("pwd").value;
    if (val === PASS) {
      isAdmin = true;
      document.getElementById("login-section").style.display = "none";
      document.getElementById("admin-section").style.display = "block";
      document.querySelectorAll(".num").forEach(el => el.classList.add("admin-mode"));
      showToast("✓ Acceso concedido");
    } else {
      showToast("Clave incorrecta");
      document.getElementById("pwd").value = "";
    }
  }

  document.getElementById("pwd").addEventListener("keydown", e => {
    if (e.key === "Enter") tryLogin();
  });

  window.tryLogin = tryLogin;

  onValue(rifaRef, snapshot => {
    const data = snapshot.val();
    sold = data ? new Set(data.map(Number)) : new Set();
    renderGrid();
  });
</script>
</body>
</html>
